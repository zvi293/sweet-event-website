<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C887"/>
      <stop offset="50%" style="stop-color:#C9A56C"/>
      <stop offset="100%" style="stop-color:#A88654"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF5EF"/>
      <stop offset="100%" style="stop-color:#F4DCDF"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="#FAF5EF" stroke-width="1.5" opacity="0.5"/>

  <!-- "S" letter elegant -->
  <text x="50" y="68"
        font-family="'Brush Script MT', 'Lucida Handwriting', cursive"
        font-size="68"
        font-style="italic"
        fill="url(#text)"
        text-anchor="middle"
        font-weight="700">S</text>

  <!-- Small decorative dots -->
  <circle cx="22" cy="35" r="1.5" fill="#FAF5EF" opacity="0.7"/>
  <circle cx="78" cy="35" r="1.5" fill="#FAF5EF" opacity="0.7"/>
  <circle cx="22" cy="65" r="1.5" fill="#FAF5EF" opacity="0.7"/>
  <circle cx="78" cy="65" r="1.5" fill="#FAF5EF" opacity="0.7"/>
</svg>
