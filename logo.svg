<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C887;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A56C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A88654;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A4B0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B86880;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Decorative ornament left -->
  <g transform="translate(40, 78)" opacity="0.85">
    <path d="M 0 0 Q -8 -10, -18 -8 Q -28 -6, -32 4 Q -28 12, -18 12 Q -8 14, 0 0" fill="url(#roseGrad)" opacity="0.7"/>
    <circle cx="-22" cy="2" r="2" fill="url(#goldGrad)"/>
    <circle cx="-12" cy="-6" r="1.5" fill="url(#goldGrad)"/>
    <circle cx="-15" cy="8" r="1.2" fill="url(#goldGrad)"/>
  </g>

  <!-- Sweet text -->
  <text x="200" y="68" font-family="'Brush Script MT', 'Lucida Handwriting', cursive" font-size="56" font-style="italic" fill="url(#roseGrad)" text-anchor="middle" filter="url(#softShadow)" font-weight="400">Sweet</text>

  <!-- Decorative line under Sweet -->
  <path d="M 130 82 Q 200 88, 270 82" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="200" cy="85" r="2.5" fill="url(#goldGrad)"/>

  <!-- Event text -->
  <text x="200" y="118" font-family="'Playfair Display', 'Georgia', serif" font-size="32" letter-spacing="8" fill="url(#goldGrad)" text-anchor="middle" font-weight="500">EVENT</text>

  <!-- Decorative ornament right -->
  <g transform="translate(360, 78) scale(-1, 1)" opacity="0.85">
    <path d="M 0 0 Q -8 -10, -18 -8 Q -28 -6, -32 4 Q -28 12, -18 12 Q -8 14, 0 0" fill="url(#roseGrad)" opacity="0.7"/>
    <circle cx="-22" cy="2" r="2" fill="url(#goldGrad)"/>
    <circle cx="-12" cy="-6" r="1.5" fill="url(#goldGrad)"/>
    <circle cx="-15" cy="8" r="1.2" fill="url(#goldGrad)"/>
  </g>

  <!-- Small sparkles -->
  <g fill="url(#goldGrad)" opacity="0.7">
    <circle cx="100" cy="40" r="1.5"/>
    <circle cx="305" cy="50" r="1.2"/>
    <circle cx="95" cy="125" r="1.3"/>
    <circle cx="310" cy="120" r="1.5"/>
  </g>

  <!-- Tagline -->
  <text x="200" y="140" font-family="'Montserrat', sans-serif" font-size="9" letter-spacing="4" fill="#A88654" text-anchor="middle" opacity="0.8">DISEÑADORA DE EVENTOS</text>
</svg>
